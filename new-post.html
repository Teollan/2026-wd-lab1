<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>New Post — BlogSpace</title>
    <script src="/scripts/auth.js"></script>
    <link rel="stylesheet" crossorigin href="/2026-wd-lab1/assets/global-gBjMG5f2.css">
  </head>
  <body>
    <header class="relative border-b border-stroke-primary bg-surface-primary">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
        <a
          href="./"
          class="flex items-center gap-2"
        >
          <img
            src="/2026-wd-lab1/images/logo.svg"
            alt="BlogSpace logo"
            class="h-8 w-8"
          />
          <span class="text-lg font-semibold text-content-primary">BlogSpace</span>
        </a>
    
        <button
          id="menu-toggle"
          class="text-content-secondary hover:text-content-primary md:hidden"
        >
          <svg
            class="h-6 w-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
    
        <nav
          id="nav-menu"
          class="hidden md:block"
        >
          <ul class="flex flex-col gap-1 md:flex-row md:gap-6">
            <li>
              <a
                href="./"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"
              >
                About
              </a>
            </li>
    
            <li class="auth-user">
              <a
                href="feed"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"
              >
                Feed
              </a>
            </li>
    
            <li class="auth-user">
              <a
                href="new-post"
                class="block px-3 py-2 text-accent-hover"
              >
                New Post
              </a>
            </li>
    
            <li class="auth-user">
              <a
                href="profile"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"
              >
                Profile
              </a>
            </li>
    
            <li class="auth-guest">
              <a
                href="sign-in"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"
              >
                Sign In
              </a>
            </li>
    
            <li class="auth-guest">
              <a
                href="sign-up"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"
              >
                Sign Up
              </a>
            </li>
          </ul>
        </nav>
      </div>
    
      <nav
        id="mobile-menu"
        class="hidden absolute top-full left-0 w-full border-y border-stroke-primary bg-surface-primary md:hidden"
      >
        <ul class="flex flex-col gap-1 px-4 py-3">
          <li>
            <a
              href="./"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              About
            </a>
          </li>
    
          <li class="auth-user">
            <a
              href="feed"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              Feed
            </a>
          </li>
    
          <li class="auth-user">
            <a
              href="new-post"
              class="block px-3 py-2 text-accent-hover"
            >
              New Post
            </a>
          </li>
    
          <li class="auth-user">
            <a
              href="profile"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              Profile
            </a>
          </li>
    
          <li class="auth-guest">
            <a
              href="sign-in"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              Sign In
            </a>
          </li>
    
          <li class="auth-guest">
            <a
              href="sign-up"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              Sign Up
            </a>
          </li>
        </ul>
      </nav>
    
      <script
        src="/scripts/menu.js"
        defer
      ></script>
    </header>

    <!-- Main -->
    <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-12">
      <div class="mx-auto max-w-2xl">
        <h1 class="mb-8 text-3xl font-bold text-content-primary">New Post</h1>

        <section
          class="rounded-xl border border-stroke-primary bg-surface-secondary p-6"
        >
          <h2 class="mb-4 text-lg font-semibold text-content-primary">
            Create a new post
          </h2>

          <form class="space-y-4">
            <div>
              <label
                for="post-title"
                class="mb-1 block text-sm font-medium text-content-secondary"
              >
                Title
              </label>

              <input
                type="text"
                id="post-title"
                placeholder="Your post title"
                class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary placeholder-content-tertiary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
              />
            </div>

            <div>
              <label
                for="post-body"
                class="mb-1 block text-sm font-medium text-content-secondary"
              >
                Content
              </label>

              <textarea
                id="post-body"
                rows="4"
                placeholder="Write your thoughts..."
                class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary placeholder-content-tertiary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
              ></textarea>
            </div>

            <button
              type="submit"
              class="cursor-pointer rounded-lg bg-accent px-5 py-2.5 text-sm font-medium text-content-primary hover:bg-accent-hover focus:ring-2 focus:ring-accent/20 focus:outline-none"
            >
              Publish post
            </button>
          </form>
        </section>
      </div>
    </main>

    <footer class="border-t border-stroke-primary bg-surface-secondary">
      <div
        class="mx-auto max-w-5xl px-4 py-6 text-center text-sm text-content-tertiary"
      >
        &copy; 2026 BlogSpace. All rights reserved.
      </div>
    </footer>
  </body>
</html>
