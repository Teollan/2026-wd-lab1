        </button>
    
        <nav

            <li class="hidden auth:list-item">

            <li class="hidden auth:list-item">
              <a
                href="new-post"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"

            <li class="hidden auth:list-item">
              <a
                href="profile"

              </a>
            </li>
    
            <li class="auth:hidden">
              <a
                href="sign-in"
                class="block px-3 py-2 text-content-secondary hover:text-content-primary"

                Sign In
              </a>
            </li>
    
            <li class="auth:hidden">
              <a
                href="sign-up"
                class="block px-3 py-2 text-accent-hover"
              >
                Sign Up

        </nav>
      </div>
    
      <nav
        id="mobile-menu"
        class="hidden absolute top-full left-0 w-full border-y border-stroke-primary bg-surface-primary md:hidden"
      >
        <ul class="flex flex-col gap-1 px-4 py-3">
          <li>
            <a
              href="./"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"
            >
              About
            </a>
          </li>
    
          <li class="hidden auth:list-item">
            <a
              href="feed"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"

              Feed
            </a>
          </li>
    
          <li class="hidden auth:list-item">
            <a
              href="new-post"
              class="block px-3 py-2 text-content-secondary hover:text-content-primary"

          <li class="hidden auth:list-item">

          </li>
        </ul>
      </nav>
    
    </header>

    <!-- Main -->
    <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-12">
      <div class="mx-auto max-w-md">
        <h1 class="mb-2 text-center text-3xl font-bold text-content-primary">
          Create an account
        </h1>

        <p class="mb-8 text-center text-content-tertiary">
          Join BlogSpace today
        </p>

        <form
          id="sign-up-form"
          action="feed"
          class="space-y-5 rounded-xl border border-stroke-primary bg-surface-secondary p-6"
        >
          <div>
            <label
              for="name"
              class="mb-1 block text-sm font-medium text-content-secondary"
            >
              Username
            </label>

            <input
              id="name"
              type="text"
              required
              placeholder="John Doe"
              class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary placeholder-content-tertiary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
            />
          </div>

          <div>
            <label
              for="email"
              class="mb-1 block text-sm font-medium text-content-secondary"
            >
              Email
            </label>

            <input
              id="email"
              type="email"
              required
              placeholder="you@example.com"
              class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary placeholder-content-tertiary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
            />
          </div>

          <div>
            <label
              for="password"
              class="mb-1 block text-sm font-medium text-content-secondary"
            >
              Password
            </label>

            <input
              id="password"
              type="password"
              required
              placeholder="••••••••"
              class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary placeholder-content-tertiary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
            />
          </div>

          <fieldset>
            <legend class="mb-2 text-sm font-medium text-content-secondary">
              Gender
            </legend>

            <div class="flex gap-6">
              <label
                class="flex items-center gap-2 text-sm text-content-secondary"
              >
                <input
                  type="radio"
                  name="gender"
                  required
                  value="male"
                  class="border-stroke-secondary bg-surface-tertiary text-accent focus:ring-accent/20"
                />

                Male
              </label>

              <label
                class="flex items-center gap-2 text-sm text-content-secondary"
              >
                <input
                  type="radio"
                  name="gender"
                  required
                  value="female"
                  class="border-stroke-secondary bg-surface-tertiary text-accent focus:ring-accent/20"
                />

                Female
              </label>

              <label
                class="flex items-center gap-2 text-sm text-content-secondary"
              >
                <input
                  type="radio"
                  name="gender"
                  required
                  value="other"
                  class="border-stroke-secondary bg-surface-tertiary text-accent focus:ring-accent/20"
                />

                Other
              </label>
            </div>
          </fieldset>

          <div>
            <label
              for="date-of-birth"
              class="mb-1 block text-sm font-medium text-content-secondary"
            >
              Date of birth
            </label>

            <input
              id="date-of-birth"
              type="date"
              placeholder="You date of birth"
              required
              class="w-full rounded-lg border border-stroke-secondary bg-surface-tertiary px-4 py-2.5 text-content-primary focus:border-accent focus:ring-2 focus:ring-accent/20 focus:outline-none"
            />
          </div>

          <button
            type="submit"
            class="w-full cursor-pointer rounded-lg bg-accent px-4 py-2.5 font-medium text-content-primary hover:bg-accent-hover focus:ring-2 focus:ring-accent/20 focus:outline-none"
          >
            Create account
          </button>

          <p class="text-center text-sm text-content-tertiary">
            Already have an account?

            <a
              href="sign-in"
              class="text-accent-hover hover:text-accent-light"
            >
              Sign in
            </a>
          </p>
        </form>
      </div>
    </main>

    <footer class="border-t border-stroke-primary bg-surface-secondary">
      <div
        class="mx-auto max-w-5xl px-4 py-6 text-center text-sm text-content-tertiary"
      >
        &copy; 2026 BlogSpace. All rights reserved.
      </div>
    </footer>

  </body>
</html>
