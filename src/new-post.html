<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>New Post — BlogSpace</title>
    <link
      rel="stylesheet"
      href="./styles/global.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/logo.svg"
    />
    <script
      type="module"
      async
      src="/scripts/auth.ts"
    ></script>
  </head>
  <body>
    {{> header location="new-post"}}

    <div id="post-form-root" class="w-full flex-1"></div>

    {{> footer}}

    <script type="module">
      import { PostForm } from "@/modules/posts/view/PostForm";
      new PostForm(document.getElementById("post-form-root"));
    </script>
  </body>
</html>
