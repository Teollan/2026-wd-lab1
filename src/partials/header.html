<header class="relative border-b border-stroke-primary bg-surface-primary">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
    <a
      href="./"
      class="flex items-center gap-2"
    >
      <img
        src="/images/logo.svg"
        alt="BlogSpace logo"
        class="h-8 w-8"
      />
      <span class="text-lg font-semibold text-content-primary">BlogSpace</span>
    </a>

    <button
      id="menu-toggle"
      class="text-content-secondary hover:text-content-primary md:hidden"
    >
      {{> icon-menu}}
    </button>

    <nav
      id="nav-menu"
      class="hidden md:block"
    >
      <ul class="flex flex-col gap-1 md:flex-row md:gap-6">
        <li>
          <a
            href="./"
            class="block px-3 py-2 {{#if (equals location "about")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            About
          </a>
        </li>

        <li class="hidden auth:list-item">
          <a
            href="feed"
            class="block px-3 py-2 {{#if (equals location "feed")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            Feed
          </a>
        </li>

        <li class="hidden auth:list-item">
          <a
            href="my-posts"
            class="block px-3 py-2 {{#if (equals location "my-posts")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            My Posts
          </a>
        </li>

        <li class="hidden auth:list-item">
          <a
            href="new-post"
            class="block px-3 py-2 {{#if (equals location "new-post")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            New Post
          </a>
        </li>

        <li class="auth:hidden">
          <a
            href="sign-in"
            class="block px-3 py-2 {{#if (equals location "sign-in")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            Sign In
          </a>
        </li>

        <li class="auth:hidden">
          <a
            href="sign-up"
            class="block px-3 py-2 {{#if (equals location "sign-up")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
          >
            Sign Up
          </a>
        </li>

        <li class="hidden auth:list-item">
          <a
            href="profile"
            class="flex h-9 w-9 items-center justify-center rounded-full bg-accent/20 text-sm font-bold text-accent-hover ring-2 {{#if (equals location "profile")}}ring-accent-hover{{else}}ring-transparent hover:ring-accent/40{{/if}}"
          >
            JD
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <nav
    id="mobile-menu"
    class="hidden absolute top-full left-0 w-full border-y border-stroke-primary bg-surface-primary md:hidden"
  >
    <ul class="flex flex-col gap-1 px-4 py-3">
      <li class="hidden auth:list-item">
        <a
          href="profile"
          class="flex items-center gap-3 px-3 py-2 {{#if (equals location "profile")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          <div
            class="flex h-9 w-9 items-center justify-center rounded-full bg-accent/20 text-sm font-bold text-accent-hover"
          >
            JD
          </div>

          <span class="font-medium text-lg">John Doe</span>
        </a>
      </li>

      <li>
        <a
          href="./"
          class="block px-3 py-2 {{#if (equals location "about")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          About
        </a>
      </li>

      <li class="hidden auth:list-item">
        <a
          href="feed"
          class="block px-3 py-2 {{#if (equals location "feed")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          Feed
        </a>
      </li>

      <li class="hidden auth:list-item">
        <a
          href="my-posts"
          class="block px-3 py-2 {{#if (equals location "my-posts")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          My Posts
        </a>
      </li>

      <li class="hidden auth:list-item">
        <a
          href="new-post"
          class="block px-3 py-2 {{#if (equals location "new-post")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          New Post
        </a>
      </li>

      <li class="auth:hidden">
        <a
          href="sign-in"
          class="block px-3 py-2 {{#if (equals location "sign-in")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          Sign In
        </a>
      </li>

      <li class="auth:hidden">
        <a
          href="sign-up"
          class="block px-3 py-2 {{#if (equals location "sign-up")}}text-accent-hover{{else}}text-content-secondary hover:text-content-primary{{/if}}"
        >
          Sign Up
        </a>
      </li>
    </ul>
  </nav>

  <script
    type="module"
    async
    src="/scripts/menu.ts"
  ></script>
</header>
