<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>My Posts — BlogSpace</title>
    <link
      rel="stylesheet"
      href="./styles/global.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/logo.svg"
    />
    <script
      type="module"
      async
      src="/scripts/auth.ts"
    ></script>
  </head>
  <body>
    {{> header location="my-posts"}}

    <div id="post-list-root" class="w-full flex-1"></div>

    {{> footer}}

    <script type="module">
      import { PostsRepository } from "@/modules/posts/data/posts.repository"
      import { PostList } from "@/modules/posts/view/PostList";

      const posts = PostsRepository.getMyPosts();
      new PostList(document.getElementById("post-list-root"), {
        title: "My Posts",
        posts,
        showActions: true
      });
    </script>
  </body>
</html>
