<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>My Posts — BlogSpace</title>
    <link
      rel="stylesheet"
      href="./styles/global.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/logo.svg"
    />
  </head>
  <body>
    <script type="module">
      import { PostsRepository } from "@/modules/posts/data/posts.repository"
      import { PostList } from "@/modules/posts/view/PostList";

      const posts = PostsRepository.getMyPosts();
      new PostList(document.body, {
        location: "my-posts",
        title: "My Posts",
        posts,
        showActions: true
      });
    </script>
  </body>
</html>
