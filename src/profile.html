<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Profile — BlogSpace</title>
    <link
      rel="stylesheet"
      href="./styles/global.css"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/logo.svg"
    />
    <script
      type="module"
      async
      src="/scripts/auth.ts"
    ></script>
  </head>
  <body>
    {{> header location="profile"}}

    <!-- Main -->
    <div id="profile-root" class="w-full flex-1"></div>

    {{> footer}}

    <script type="module">
      import { Profile } from '@/modules/user/view/Profile';

      new Profile(document.getElementById("profile-root"));

      document.getElementById("log-out-button").addEventListener("click", () => {
        localStorage.removeItem("auth");
        document.documentElement.removeAttribute("data-auth");
      });
    </script>
  </body>
</html>
